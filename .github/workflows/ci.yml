name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - name: Test with 100% coverage gate
        run: |
          set -euo pipefail
          for pkg in $(go list ./...); do
            if ! ls "$(go list -f '{{.Dir}}' "$pkg")"/*_test.go >/dev/null 2>&1; then
              echo "${pkg}: no tests — skipping"; continue
            fi
            go test -cover -coverprofile=cover.out "$pkg"
            total=$(go tool cover -func=cover.out | awk '/^total:/ {print substr($3,1,length($3)-1)}')
            echo "${pkg} coverage: ${total}%"
            awk -v t="$total" 'BEGIN{exit (t+0>=100.0)?0:1}' || { echo "coverage ${total}% < 100%"; exit 1; }
          done
